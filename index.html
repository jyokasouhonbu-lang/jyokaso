<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOKASO-DESTROY-V5</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00e5ff; --danger: #ff0055; --success: #00ff66; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { width: 180px; height: 180px; border-radius: 50%; border: 8px solid var(--danger); background: #000; color: #fff; font-size: 1.4em; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .card { background: var(--card); padding: 12px; border-left: 5px solid var(--accent); border-radius: 4px; }
        .card.full { grid-column: span 2; }
        .label { font-size: 0.7em; color: var(--accent); }
        .value { font-size: 1.8em; font-weight: bold; }
        .btn-group { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .main-btn { padding: 20px; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; color: #000; cursor: pointer; }
        #save-btn { background: var(--success); }
        #list-btn { background: var(--accent); }
        #log { background: #000; height: 50px; overflow-y: auto; font-size: 0.7em; padding: 5px; color: var(--danger); border-top: 1px solid #333; margin-top: 10px; }
        .listening { color: var(--danger); animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="start-overlay"><button id="start-btn">DESTROY<br>V5 START</button></div>

<div style="display: flex; justify-content: space-between; font-size: 0.8em; padding: 5px;">
    <div><span id="mic-status">●</span> <span id="status-text">待機</span></div>
    <div id="user-name">未ログイン</div>
</div>

<div class="grid">
    <div class="card"><div class="label">pH</div><div class="value" id="res-ph">--</div></div>
    <div class="card"><div class="label">DO</div><div class="value" id="res-do">--</div></div>
    <div class="card"><div class="label">透視度</div><div class="value" id="res-toshido">--</div></div>
    <div class="card"><div class="label">残留塩素</div><div class="value" id="res-cl">--</div></div>
    <div class="card"><div class="label">水温</div><div class="value" id="res-temp">--</div></div>
    <div class="card full"><div class="label">指摘(1-7) / メモ</div><div id="note-display" style="font-size: 0.9em; min-height: 40px;">--</div></div>
</div>

<div id="log"></div>

<div class="btn-group">
    <button id="save-btn" class="main-btn">保存して次へ</button>
    <button id="list-btn" class="main-btn">本日の履歴</button>
</div>

<div id="history-area" style="display:none; background:#111; padding:10px; font-size:0.8em; border:1px solid var(--accent); margin-top:10px;"></div>

<script>
    /** ★ここにGASのウェブアプリURLを貼り付け★ */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzF9N8WTcDQCMf0Sy43yeHPc3avSyh6i66-tiWSxI1xEkHF0hfw3xXTxfK7YdSFxY72zw/exec";

    // 9名の検査員リスト（誤変換・活舌対策）
    const inspectors = [
        {key: "守矢", aliases: ["守矢", "守谷", "もりや"]},
        {key: "金井", aliases: ["金井", "家内", "かない"]},
        {key: "長嶋祐樹", aliases: ["長嶋祐樹", "長島祐樹", "永島祐樹", "ながしまゆうき", "ゆうき"]},
        {key: "永嶋秀記", aliases: ["永嶋秀記", "永島秀記", "永島英記", "ながしまひでき", "ひでき"]},
        {key: "高田", aliases: ["高田", "たかだ", "たかた"]},
        {key: "吉田", aliases: ["吉田", "よしだ"]},
        {key: "江刺", aliases: ["江刺", "江差", "餌差し", "えさし"]},
        {key: "高嶋", aliases: ["高嶋", "高島", "たかしま"]},
        {key: "渋谷", aliases: ["渋谷", "しぶや"]}
    ];
    
    let state = { inspector: "", ph: "", do: "", toshido: "", cl: "", temp: "", note1:"", note2:"", note3:"", note4:"", note5:"", note6:"", note7:"" };
    let isLocked = false;

    const synth = window.speechSynthesis;
    function speak(text) {
        synth.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP'; uttr.rate = 1.3;
        synth.speak(uttr);
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP'; recognition.continuous = true;

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-overlay').style.display = 'none';
        speak("起動。名前をどうぞ。");
        recognition.start();
        updateStatus(true);
    };

    recognition.onresult = (event) => {
        if (isLocked) return;
        const transcript = event.results[event.results.length - 1][0].transcript;
        const cmd = kanjiToNum(transcript.toLowerCase().replace(/\s+/g, ""));
        addLog(cmd);
        analyze(cmd);
    };

    recognition.onend = () => { if (!isLocked) recognition.start(); };

    function analyze(cmd) {
        // 終了コマンド
        if (match(cmd, ["終了", "ストップ", "終わり", "おわり"])) {
            isLocked = true; recognition.stop(); updateStatus(false);
            speak("音声入力を終了しました。"); return;
        }

        // 検査員判定
        if (!state.inspector) {
            const user = inspectors.find(i => i.aliases.some(a => cmd.includes(a)));
            if (user) {
                state.inspector = user.key;
                document.getElementById('user-name').innerText = user.key;
                speak(user.key + "さん。どうぞ。");
            }
            return;
        }

        const num = cmd.match(/\d+(\.\d+)?/)?.[0];
        
        // 項目判定（あだ名リスト）
        if (match(cmd, ["ペーハー", "ベーハー", "ph", "ピーエイチ"])) {
            state.ph = num; updateUI("res-ph", num); speak("PH" + num);
        } else if (match(cmd, ["デーオー", "デオ", "ディーオー", "do"])) {
            state.do = num; updateUI("res-do", num); speak("DO" + num);
        } else if (match(cmd, ["透視", "トウシ", "トウメイド", "透明", "投資", "ドウド", "とうめい", "みず"])) {
            state.toshido = num; updateUI("res-toshido", num); speak("透視" + num);
        } else if (match(cmd, ["残留塩素", "残留", "ざんりゅう", "えんそ"])) {
            let clVal = cmd.includes("不検出") ? "不検出" : (cmd.includes("検出") ? "検出" : num);
            state.cl = clVal; updateUI("res-cl", clVal); speak("塩素" + clVal);
        } else if (match(cmd, ["水温", "すいおん", "おんど"])) {
            state.temp = num; updateUI("res-temp", num); speak("水温" + num);
        } else if (match(cmd, ["指摘", "してき", "異常", "いじょう", "メモ", "めも", "備考", "びこう"])) {
            const idxMatch = cmd.match(/([1-7])/);
            const idx = idxMatch ? idxMatch[1] : "1";
            const note = cmd.split(/指摘[1-7]?|異常|メモ|備考/)[1] || "異常あり";
            state["note" + idx] = note; renderNotes(); speak("メモ" + idx + "了解");
        }
    }

    function match(cmd, list) { return list.some(word => cmd.includes(word)); }
    function kanjiToNum(str) {
        const kanji = {"ゼロ":0,"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"点":"."};
        return str.replace(/[一二三四五六七八九ゼロ点]/g, s => kanji[s]);
    }

    function renderNotes() {
        let html = "";
        for(let i=1; i<=7; i++) if(state["note"+i]) html += `<div>[${i}] ${state["note"+i]}</div>`;
        document.getElementById('note-display').innerHTML = html || "--";
    }

    document.getElementById('save-btn').onclick = () => {
        if (!state.inspector) { alert("ログインしてください"); return; }
        speak("保存中");
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(state) })
        .then(() => { speak("完了"); setTimeout(()=>location.reload(), 800); })
        .catch(() => speak("失敗"));
    };

    document.getElementById('list-btn').onclick = () => {
        const area = document.getElementById('history-area');
        area.style.display = "block"; area.innerText = "読込中...";
        fetch(GAS_URL + "?name=" + encodeURIComponent(state.inspector))
        .then(res => res.json())
        .then(data => {
            area.innerHTML = "<b>本日の履歴:</b><br>" + data.map(r => `・${new Date(r[0]).toLocaleTimeString()} pH${r[2]}`).join("<br>");
        });
    };

    function updateUI(id, val) { document.getElementById(id).innerText = val || "--"; }
    function updateStatus(listening) {
        document.getElementById('mic-status').className = listening ? "listening" : "";
        document.getElementById('status-text').innerText = listening ? "聴取中" : "停止";
    }
    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML = "<div>" + m + "</div>" + l.innerHTML;
    }
</script>
</body>
</html>
