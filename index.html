<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOKASO-DESTROY-V4</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #00ffcc; --danger: #ff0055; --success: #00ff66; }
        body { font-family: 'Impact', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { width: 180px; height: 180px; border-radius: 50%; border: 10px double var(--danger); background: #000; color: #fff; font-size: 1.5em; font-weight: bold; cursor: pointer; }
        
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--card); padding: 15px; border: 1px solid #333; border-radius: 5px; box-shadow: inset 0 0 10px #00ffcc33; }
        .card.full { grid-column: span 2; }
        .label { font-size: 0.8em; color: var(--accent); text-transform: uppercase; }
        .value { font-size: 2em; font-weight: bold; color: #fff; margin-top: 5px; }
        .note-list { font-size: 0.9em; text-align: left; margin-top: 10px; color: #ccc; }

        .btn-group { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .main-btn { padding: 25px; border: none; border-radius: 5px; font-size: 1.2em; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #save-btn { background: var(--success); color: #000; grid-column: span 2; }
        #list-btn { background: var(--accent); color: #000; }
        
        #history-area { margin-top: 20px; background: #111; padding: 15px; border: 1px dashed var(--accent); display: none; }
        #log { background: #000; height: 50px; overflow-y: auto; font-size: 0.8em; padding: 5px; color: #ff0055; margin-top: 10px; }
        .listening { color: var(--danger); animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="start-overlay"><button id="start-btn">DESTROY<br>ACTIVATE</button></div>

<div class="header">
    <div><span id="mic-status">●</span> <span id="status-text">WAITING...</span></div>
    <div id="user-name">OFFLINE</div>
</div>

<div class="grid">
    <div class="card"><div class="label">pH</div><div class="value" id="res-ph">--</div></div>
    <div class="card"><div class="label">DO</div><div class="value" id="res-do">--</div></div>
    <div class="card"><div class="label">透視度</div><div class="value" id="res-toshido">--</div></div>
    <div class="card"><div class="label">残留塩素</div><div class="value" id="res-cl">--</div></div>
    <div class="card"><div class="label">水温</div><div class="value" id="res-temp">--</div></div>
    <div class="card full">
        <div class="label">指摘事項 (1-7)</div>
        <div id="note-display" class="note-list">指摘なし</div>
    </div>
</div>

<div id="log"></div>

<div class="btn-group">
    <button id="save-btn" class="main-btn">SAVE TO SHEET (保存)</button>
    <button id="list-btn" class="main-btn">HISTORY (履歴)</button>
</div>

<div id="history-area"></div>

<script>
    /** ★ここにGASのURLを貼り付け★ */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzF9N8WTcDQCMf0Sy43yeHPc3avSyh6i66-tiWSxI1xEkHF0hfw3xXTxfK7YdSFxY72zw/exec";

    // 検査員リスト（誤変換対策：守矢は守谷も許容）
    const inspectors = [
        {key: "守矢", aliases: ["守矢", "守谷", "モリヤ", "もりや"]},
        {key: "金井", aliases: ["金井", "カナイ", "かない"]},
        {key: "長嶋祐樹", aliases: ["長嶋祐樹", "ナガシマユウキ", "ながしまゆうき"]}
    ];
    
    let state = { inspector: "", ph: "", do: "", toshido: "", cl: "", temp: "", note1:"", note2:"", note3:"", note4:"", note5:"", note6:"", note7:"" };
    let isLocked = false;

    const synth = window.speechSynthesis;
    function speak(text) {
        synth.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        uttr.rate = 1.3;
        synth.speak(uttr);
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = true;

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-overlay').style.display = 'none';
        speak("システム起動。おつかれさまです。お名前をどうぞ。");
        recognition.start();
        updateStatus(true);
    };

    recognition.onresult = (event) => {
        if (isLocked) return;
        const transcript = event.results[event.results.length - 1][0].transcript;
        const cmd = kanjiToNum(transcript.toLowerCase().replace(/\s+/g, ""));
        addLog(cmd);
        analyze(cmd);
    };

    recognition.onend = () => { if (!isLocked) recognition.start(); };

    function analyze(cmd) {
        // 音声終了コマンド
        if (match(cmd, ["音声入力終了", "音声終了", "終わり", "ストップ"])) {
            isLocked = true;
            recognition.stop();
            updateStatus(false);
            speak("音声入力を終了。車に戻って検査表にうつしてください。");
            return;
        }

        // 検査員判定（誤変換「守谷」も守矢として処理）
        if (!state.inspector) {
            const user = inspectors.find(i => i.aliases.some(a => cmd.includes(a)));
            if (user) {
                state.inspector = user.key;
                document.getElementById('user-name').innerText = user.key;
                speak(user.key + "さん、了解。");
            }
            return;
        }

        // 数字抽出
        const num = cmd.match(/\d+(\.\d+)?/)?.[0];
        
        // 判定ロジック強化
        if (match(cmd, ["ペーハー", "ベーハー", "ph", "ピーエイチ"])) {
            state.ph = num; updateUI("res-ph", num); speak("PH " + num);
        } else if (match(cmd, ["デーオー", "デオ", "ディーオー", "do"])) {
            state.do = num; updateUI("res-do", num); speak("DO " + num);
        } else if (match(cmd, ["透視", "トウシ", "トウメイド", "投資", "当事", "ドウド", "透明"])) {
            state.toshido = num; updateUI("res-toshido", num); speak("透視度 " + num);
        } else if (match(cmd, ["残留塩素", "残留", "ざんりゅう", "えんそ"])) {
            let clVal = cmd.includes("不検出") ? "不検出" : (cmd.includes("検出") ? "検出" : num);
            state.cl = clVal; updateUI("res-cl", clVal); speak("残留塩素 " + clVal);
        } else if (match(cmd, ["水温", "すいおん", "おんど"])) {
            state.temp = num; updateUI("res-temp", num); speak("水温 " + num);
        } else if (match(cmd, ["指摘", "してき", "異常"])) {
            // 指摘1〜7の数字を特定（漢数字も考慮済み）
            const idxMatch = cmd.match(/([1-7])/);
            const idx = idxMatch ? idxMatch[1] : "1";
            const note = cmd.split(/指摘[1-7]?|異常/)[1] || "異常あり";
            state["note" + idx] = note; 
            renderNotes(); 
            speak("指摘" + idx + "了解");
        }
    }

    function match(cmd, list) { return list.some(word => cmd.includes(word)); }
    
    function kanjiToNum(str) {
        const kanji = {"ゼロ":0,"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"点":"."};
        return str.replace(/[一二三四五六七八九ゼロ点]/g, s => kanji[s]);
    }

    function renderNotes() {
        let html = "";
        for(let i=1; i<=7; i++) {
            if(state["note"+i]) html += `<div>[${i}] ${state["note"+i]}</div>`;
        }
        document.getElementById('note-display').innerHTML = html || "指摘なし";
    }

    document.getElementById('save-btn').onclick = () => {
        if (!state.inspector) { alert("ログインしてください"); return; }
        speak("セーブ中");
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(state) })
        .then(() => {
            speak("保存完了");
            setTimeout(() => location.reload(), 1000);
        }).catch(() => speak("失敗"));
    };

    document.getElementById('list-btn').onclick = () => {
        const area = document.getElementById('history-area');
        area.style.display = "block"; area.innerText = "LOADING...";
        fetch(GAS_URL + "?name=" + encodeURIComponent(state.inspector))
        .then(res => res.json())
        .then(data => {
            area.innerHTML = "<b>TODAY'S LOG:</b><br>" + data.map(r => `・${new Date(r[0]).toLocaleTimeString()} : pH${r[2]} DO${r[3]}`).join("<br>");
        });
    };

    function updateUI(id, val) { document.getElementById(id).innerText = val || "--"; }
    function updateStatus(listening) {
        document.getElementById('mic-status').className = listening ? "listening" : "";
        document.getElementById('status-text').innerText = listening ? "LISTENING..." : "LOCKED";
    }
    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML = "<div>" + m + "</div>" + l.innerHTML;
    }
</script>
</body>
</html>
