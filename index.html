<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOKASO-DESTROY-V2</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { width: 200px; height: 200px; border-radius: 50%; border: 8px solid var(--danger); background: #000; color: #fff; font-size: 1.8em; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border-bottom: 4px solid var(--accent); }
        .card.full { grid-column: span 2; }
        .label { font-size: 0.8em; color: #94a3b8; }
        .value { font-size: 1.6em; font-weight: bold; color: var(--success); }
        #log { background: #000; height: 100px; overflow-y: auto; font-size: 0.7em; padding: 10px; border: 1px solid #334155; margin-top: 10px; color: #4ade80; }
        .listening { color: var(--danger); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="start-overlay">
    <button id="start-btn">DESTROY START</button>
    <p style="color: #64748b; margin-top: 20px;">開始後に「許可」を押してください</p>
</div>

<div style="display: flex; justify-content: space-between; align-items: center;">
    <div><span id="mic-icon" class="">●</span> <span id="status">音声待機中</span></div>
    <div id="user-name">未ログイン</div>
</div>

<div class="grid">
    <div class="card"><div class="label">pH</div><div class="value" id="res-ph">--</div></div>
    <div class="card"><div class="label">DO</div><div class="value" id="res-do">--</div></div>
    <div class="card"><div class="label">透視度</div><div class="value" id="res-toshido">--</div></div>
    <div class="card"><div class="label">塩素</div><div class="value" id="res-cl">--</div></div>
    <div class="card"><div class="label">水温</div><div class="value" id="res-temp">--</div></div>
    <div class="card full"><div class="label">指摘事項 (最新)</div><div class="value" id="res-note" style="font-size: 1em;">--</div></div>
</div>

<div id="log"></div>

<script>
    /** ★ここにGASのウェブアプリURLを貼り付け★ */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzF9N8WTcDQCMf0Sy43yeHPc3avSyh6i66-tiWSxI1xEkHF0hfw3xXTxfK7YdSFxY72zw/exec";

    const inspectors = ["守矢", "高田", "金井", "長嶋祐樹", "江刺", "吉田", "永嶋秀記", "渋谷", "高嶋"];
    let state = { inspector: "", ph: "", do: "", toshido: "", cl: "", temp: "", note1: "", note2: "", note3: "", note4: "", note5: "", note6: "", note7: "" };

    // --- 音声合成（口）の設定 ---
    const synth = window.speechSynthesis;
    function speak(text) {
        if (!text) return;
        // 以前の読み上げをキャンセル
        synth.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        uttr.rate = 1.2;
        synth.speak(uttr);
    }

    // --- 音声認識（耳）の設定 ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = true;
    recognition.interimResults = false;

    // 開始ボタン
    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-overlay').style.display = 'none';
        // ブラウザの音声制限を解除するための「空読み上げ」
        speak("システムを起動しました。");
        recognition.start();
        document.getElementById('mic-icon').className = "listening";
        document.getElementById('status').innerText = "聴取中...";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript;
        const cleanCmd = kanjiToNum(transcript.toLowerCase().replace(/\s+/g, ""));
        addLog(cleanCmd);
        analyze(cleanCmd);
    };

    recognition.onend = () => recognition.start(); // 止まっても再起動

    // --- 解析ロジック（活舌対策） ---
    function analyze(cmd) {
        // 1. ログイン（名前に「です」や「さん」が付いてもOK）
        if (!state.inspector) {
            const user = inspectors.find(n => cmd.includes(n));
            if (user) {
                state.inspector = user;
                document.getElementById('user-name').innerText = user + " 検査員";
                speak(user + "さん、こんにちは。準備完了です。");
            }
            return;
        }

        // 2. 送信・完了
        if (cmd.includes("送信") || cmd.includes("完了") || cmd.includes("終わり") || cmd.includes("おわり")) {
            speak("スプレッドシートに保存します。");
            sendData();
            return;
        }

        // 3. 項目マッチング（あだ名リスト）
        const num = cmd.match(/\d+(\.\d+)?/)?.[0];
        
        if (match(cmd, ["ピーエイチ", "ピエチ", "ヒエチ", "ph", "ベーハー"])) {
            state.ph = num;
            updateUI("res-ph", num);
            speak("ピーエイチ " + num);
        } else if (match(cmd, ["ディーオー", "デオ", "ディオ", "do"])) {
            state.do = num;
            updateUI("res-do", num);
            speak("ディーオー " + num);
        } else if (match(cmd, ["透視度", "とうし", "透明"])) {
            state.toshido = num;
            updateUI("res-toshido", num);
            speak("透視度 " + num);
        } else if (match(cmd, ["塩素", "残留", "えんそ"])) {
            let clVal = cmd.includes("不検出") ? "不検出" : (cmd.includes("検出") ? "検出" : num);
            state.cl = clVal;
            updateUI("res-cl", clVal);
            speak("塩素 " + clVal);
        } else if (match(cmd, ["水温", "すいおん", "温度"])) {
            state.temp = num;
            updateUI("res-temp", num);
            speak("水温 " + num);
        } else if (match(cmd, ["指摘", "してき", "異常"])) {
            const idx = cmd.match(/[1-7]/)?.[0] || "1";
            const note = cmd.split(/指摘[1-7]?|異常/)[1] || cmd;
            state["note" + idx] = note;
            updateUI("res-note", note);
            speak("指摘" + idx + " 了解");
        }
    }

    // 複数の言葉のどれかに当たればOKとする関数
    function match(cmd, list) {
        return list.some(word => cmd.includes(word));
    }

    // 漢数字を数字に直す（活舌が悪いと漢字で認識されやすいため）
    function kanjiToNum(str) {
        const kanji = {"ゼロ":0,"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"点":"."};
        return str.replace(/[一二三四五六七八九ゼロ点]/g, s => kanji[s]);
    }

    function updateUI(id, val) {
        document.getElementById(id).innerText = val || "--";
    }

    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML = "<div>" + m + "</div>" + l.innerHTML;
    }

    function sendData() {
        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(state)
        }).then(() => {
            speak("保存しました。次の現場へリセットします。");
            reset();
        }).catch(() => speak("通信エラーです。"));
    }

    function reset() {
        Object.keys(state).forEach(k => { if(k!=="inspector") state[k]=""; });
        ["res-ph","res-do","res-toshido","res-cl","res-temp","res-note"].forEach(id => document.getElementById(id).innerText="--");
    }
</script>
</body>
</html>
