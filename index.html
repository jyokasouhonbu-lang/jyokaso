<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESTROY-V10-RECOVERY</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #00e5ff; --danger: #ff0055; --success: #00ff66; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        #start-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-btn { width: 160px; height: 160px; border-radius: 50%; border: 8px solid var(--danger); background: #000; color: #fff; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .card { background: var(--card); padding: 10px; border-left: 4px solid var(--accent); border-radius: 4px; }
        .label { font-size: 0.7em; color: var(--accent); }
        .value { font-size: 1.5em; font-weight: bold; }
        .btn-group { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .main-btn { padding: 18px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; color: #000; }
        #save-btn { background: var(--success); }
        #list-btn { background: var(--accent); }
        #history-area { display: none; margin-top: 15px; background: #111; border: 1px solid var(--accent); padding: 10px; border-radius: 8px; font-size: 0.8em; max-height: 250px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th { border-bottom: 1px solid var(--accent); text-align: left; color: var(--accent); padding: 5px; }
        td { border-bottom: 1px solid #222; padding: 8px 5px; }
        #log { background: #000; height: 40px; overflow-y: auto; font-size: 0.7em; padding: 5px; color: var(--danger); border-top: 1px solid #333; margin-top: 10px; }
        .listening { color: var(--danger); animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="start-overlay"><button id="start-btn">DESTROY<br>V10 START</button></div>

<div style="display: flex; justify-content: space-between; font-size: 0.8em; padding: 8px; background: #111;">
    <div><span id="mic-status">●</span> <span id="status-text">待機</span></div>
    <div id="user-display" style="color: var(--accent); font-weight: bold;">ログインしてください</div>
</div>

<div class="grid">
    <div class="card"><div class="label">pH</div><div class="value" id="res-ph">--</div></div>
    <div class="card"><div class="label">DO</div><div class="value" id="res-do">--</div></div>
    <div class="card"><div class="label">透視度 (Tr)</div><div class="value" id="res-toshido">--</div></div>
    <div class="card"><div class="label">残留塩素</div><div class="value" id="res-cl">--</div></div>
    <div class="card"><div class="label">水温</div><div class="value" id="res-temp">--</div></div>
    <div class="card" style="grid-column: span 2;"><div class="label">指摘 (1-7)</div><div id="note-display" style="font-size: 0.85em; min-height: 40px; color: #ccc;">--</div></div>
</div>

<div id="log"></div>

<div class="btn-group">
    <button id="save-btn" class="main-btn">💾 スプレッドシートへ保存</button>
    <button id="list-btn" class="main-btn">📋 当日の履歴を確認</button>
</div>

<div id="history-area">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <b style="color:var(--accent);">本日のあなたの履歴</b>
        <span onclick="document.getElementById('history-area').style.display='none'" style="cursor:pointer;">[閉じる]</span>
    </div>
    <div id="history-content"></div>
</div>

<script>
    /** ★ここにGASのURLを貼り付け★ */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzF9N8WTcDQCMf0Sy43yeHPc3avSyh6i66-tiWSxI1xEkHF0hfw3xXTxfK7YdSFxY72zw/exec";

    const inspectors = [
        {k: "守矢", a: ["もりや", "守谷", "守矢", "モリヤ", "デストロイ", "もり"]},
        {k: "金井", a: ["かない", "金井", "カナ"]},
        {k: "長嶋祐樹", a: ["ながしまゆうき", "長嶋祐樹", "トランプ", "長島祐樹", "ゆうき"]},
        {k: "永嶋秀記", a: ["ながしまひでき", "ジョージ", "永嶋秀記", "ひでき"]},
        {k: "高田", a: ["たかだ", "高田"]},
        {k: "吉田", a: ["よしだ", "吉田"]},
        {k: "江刺", a: ["えさし", "江刺", "えさ"]},
        {k: "高嶋", a: ["たかしま", "高嶋", "高島"]},
        {k: "渋谷", a: ["しぶや", "渋谷"]}
    ];
    
    let state = { inspector: "", ph: "", do: "", toshido: "", cl: "", temp: "", note1:"", note2:"", note3:"", note4:"", note5:"", note6:"", note7:"" };
    let isLocked = false;

    const synth = window.speechSynthesis;
    function speak(text) {
        if (!text) return;
        synth.cancel(); // 前の読み上げを強制停止
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP'; uttr.rate = 1.3;
        synth.speak(uttr);
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP'; recognition.continuous = true;

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-overlay').style.display = 'none';
        speak("システム起動。お名前を。");
        recognition.start();
        updateStatus(true);
    };

    recognition.onresult = (event) => {
        if (isLocked) return;
        const transcript = event.results[event.results.length - 1][0].transcript;
        const cmd = kanjiToNum(transcript.toLowerCase().replace(/\s+/g, ""));
        addLog(cmd);
        analyze(cleanVoiceInput(cmd));
    };

    function cleanVoiceInput(str) {
        return str.replace(/投資|当事|当時|糖度|透明|トウド|ドウド|tr|ティーアール|ミズ|みず/g, "透視度")
                  .replace(/デーオー|デオ|ディーオー|どう|どお/g, "do")
                  .replace(/シテキ|してき|メモ|めも|異常|いじょう/g, "指摘");
    }

    recognition.onend = () => { if (!isLocked) recognition.start(); };

    function analyze(cmd) {
        if (match(cmd, ["終了", "ストップ"])) {
            isLocked = true; recognition.stop(); updateStatus(false);
            speak("音声終了。"); return;
        }

        // --- 名前の復唱バグ修正箇所 ---
        if (!state.inspector) {
            const user = inspectors.find(i => i.a.some(a => cmd.includes(a)));
            if (user) {
                state.inspector = user.k; // 内部データに保存
                document.getElementById('user-display').innerText = "検査員: " + user.k;
                speak(user.k + "さん、了解しました。"); // user.keyではなくuser.kを使用
            }
            return;
        }

        const num = cmd.match(/\d+(\.\d+)?/)?.[0];
        
        if (match(cmd, ["ペーハー", "ベーハー", "ph"])) {
            state.ph = num; updateUI("res-ph", num); speak("ペーハー " + num);
        } else if (match(cmd, ["do"])) {
            state.do = num; updateUI("res-do", num); speak("デーオー " + num);
        } else if (match(cmd, ["透視度"])) {
            state.toshido = num; updateUI("res-toshido", num); speak("透視 " + num);
        } else if (match(cmd, ["残留塩素", "ざんりゅう", "えんそ"])) {
            let clVal = cmd.includes("不検出") ? "不検出" : (cmd.includes("検出") ? "検出" : num);
            state.cl = clVal; updateUI("res-cl", clVal); speak("塩素 " + clVal);
        } else if (match(cmd, ["水温", "すいおん"])) {
            state.temp = num; updateUI("res-temp", num); speak("水温 " + num);
        } else if (match(cmd, ["指摘"])) {
            const idxMatch = cmd.match(/([1-7])/);
            const idx = idxMatch ? idxMatch[1] : "1";
            const note = cmd.split(/指摘[1-7]?/)[1] || "入力あり";
            state["note" + idx] = note; renderNotes(); speak("指摘" + idx + "了解");
        }
    }

    function match(cmd, list) { return list.some(word => cmd.includes(word)); }
    function kanjiToNum(str) {
        const kanji = {"ゼロ":0,"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"点":"."};
        return str.replace(/[一二三四五六七八九ゼロ点]/g, s => kanji[s]);
    }

    function renderNotes() {
        let h = "";
        for(let i=1; i<=7; i++) if(state["note"+i]) h += `<div>[${i}] ${state["note"+i]}</div>`;
        document.getElementById('note-display').innerHTML = h || "--";
    }

    document.getElementById('save-btn').onclick = () => {
        if (!state.inspector) return;
        speak("保存します。");
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(state) })
        .then(() => { speak("保存しました。"); setTimeout(()=>location.reload(), 1000); });
    };

    document.getElementById('list-btn').onclick = () => {
        if (!state.inspector) return;
        const area = document.getElementById('history-area');
        const content = document.getElementById('history-content');
        area.style.display = "block";
        content.innerHTML = "読込中...";
        fetch(GAS_URL + "?name=" + encodeURIComponent(state.inspector))
        .then(res => res.json())
        .then(data => {
            if (data.length === 0) { content.innerHTML = "今日のデータはありません"; return; }
            let html = "<table><tr><th>時刻</th><th>pH</th><th>DO</th><th>Tr</th></tr>";
            data.forEach(row => {
                const time = new Date(row[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                html += `<tr><td>${time}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td></tr>`;
            });
            html += "</table>";
            content.innerHTML = html;
        });
    };

    function updateUI(id, val) { document.getElementById(id).innerText = val || "--"; }
    function updateStatus(listening) {
        document.getElementById('mic-status').className = listening ? "listening" : "";
        document.getElementById('status-text').innerText = listening ? "聴取中" : "停止";
    }
    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML = "<div>" + m + "</div>" + l.innerHTML;
    }
</script>
</body>
</html>
